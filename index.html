<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純 HTML 俄羅斯方塊</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 遊戲主畫面 -->
        <div class="board-container">
            <canvas id="game-board" width="300" height="600"></canvas>
            <div id="game-over-screen" class="overlay hidden">
                <h2>遊戲結束</h2>
                <button id="restart-btn" class="btn">重新開始</button>
            </div>
            <div id="start-screen" class="overlay">
                <h2>Tetris</h2>
                <button id="start-btn" class="btn">開始遊戲</button>
            </div>
        </div>

        <!-- 側邊欄：資訊與控制 -->
        <div class="side-panel">
            <div class="panel-box next-block-box">
                <h3>下一個方塊</h3>
                <canvas id="next-block" width="120" height="120"></canvas>
            </div>
            
            <div class="panel-box score-box">
                <h3>分數</h3>
                <div id="score" class="score-value">0</div>
            </div>

            <div class="panel-box controls-box">
                <h3>操作說明</h3>
                <ul>
                    <li><span class="key">⬅️</span> <span class="key">➡️</span> 左右移動</li>
                    <li><span class="key">⬇️</span> 加速下落</li>
                    <li><span class="key">⬆️</span> 右旋轉</li>
                    <li><span class="key">Z</span> 左旋轉</li>
                    <li><span class="key">Space</span> 直接下落</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
